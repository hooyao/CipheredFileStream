name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build src/CipheredFileStream/CipheredFileStream.csproj -c Release

      - name: Test (functional)
        run: dotnet test tests/CipheredFileStream.Test/ -c Release --filter "Category!=Performance&Category!=Benchmark&Category!=Profiling&Category!=Endurance" --logger "console;verbosity=normal"
